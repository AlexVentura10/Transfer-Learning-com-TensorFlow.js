<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <title>Transfer Learning - TensorFlow.js</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
  </head>  
  <body>
    <h1>Faça sua própria "Teachable Machine" usando Transfer Learning com MobileNet v3.</h1>
    
    <p id="status">Aguardando carregamento do TF.js...</p>
    
    <video id="webcam" autoplay muted></video>
    
    <hr>
    
    <button id="enableCam">Ativar Webcam</button>
    <button class="dataCollector" data-1hot="0" data-name="Classe 0">Coletar Dados Classe 0</button>
    <button class="dataCollector" data-1hot="1" data-name="Classe 1">Coletar Dados Classe 1</button>
    <button class="dataCollector" data-1hot="2" data-name="Classe 2">Coletar Dados Classe 2</button>
    
    <button id="train">Treinar e Prever!</button>
    <button id="reset">Resetar</button>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js" type="text/javascript"></script>

    <script type="module" src="script.js"></script>
  </body>
</html>
